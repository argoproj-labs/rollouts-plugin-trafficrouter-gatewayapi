apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-multi-rule
  namespace: default
spec:
  (length(rules)): 2
  rules:
    - backendRefs:
        - name: httproute-multi-rule-header-stable-service
        - name: httproute-multi-rule-header-canary-service
          (weight): 0
    - backendRefs:
        - name: httproute-multi-rule-header-stable-service
        - name: httproute-multi-rule-header-canary-service
          (weight): 0
