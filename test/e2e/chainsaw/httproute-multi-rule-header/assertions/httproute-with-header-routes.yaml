# After setHeaderRoute, the plugin must inject one managed rule per source rule.
# This HTTPRoute has 2 source rules (queryParam discriminator + header discriminator),
# so we expect 4 rules total: 2 original weight-split rules + 2 managed canary-only rules.
# Bug (issue #207 / #143): the plugin currently injects only 1 managed rule (for the first
# source rule), so this assertion will fail until the fix is applied.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-multi-rule
  namespace: default
spec:
  (length(rules)): 4
  rules:
    # original rule 0 — weight-split, queryParam discriminator
    - backendRefs:
        - name: httproute-multi-rule-header-stable-service
          (weight): 70
        - name: httproute-multi-rule-header-canary-service
          (weight): 30
      matches:
        - queryParams:
            - name: env
              value: production
    # original rule 1 — weight-split, header discriminator
    - backendRefs:
        - name: httproute-multi-rule-header-stable-service
          (weight): 70
        - name: httproute-multi-rule-header-canary-service
          (weight): 30
      matches:
        - headers:
            - name: x-ct-env
              value: production
    # managed rule for source rule 0 — canary only, queryParam + canary header
    # index 0 keeps the bare managed name for backward compatibility
    - name: canary-route1
      backendRefs:
        - name: httproute-multi-rule-header-canary-service
      matches:
        - queryParams:
            - name: env
              value: production
          headers:
            - name: X-Version
              type: Exact
              value: v2
    # managed rule for source rule 1 — canary only, header discriminator + canary header
    # index 1 gets a "-1" suffix so Gateway API's unique-name constraint is satisfied
    - name: canary-route1-1
      backendRefs:
        - name: httproute-multi-rule-header-canary-service
      matches:
        - headers:
            - name: x-ct-env
              value: production
            - name: X-Version
              type: Exact
              value: v2
