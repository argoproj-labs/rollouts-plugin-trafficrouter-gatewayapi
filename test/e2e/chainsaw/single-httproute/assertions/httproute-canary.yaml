apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-basic
  namespace: default
spec:
  (length(rules)): 1
  rules:
    - backendRefs:
        - name: single-httproute-stable-service
          (weight): 70
        - name: single-httproute-canary-service
          (weight): 30
