apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: single-httproute-filters
spec:
  description: >
    Verifies that existing HTTPRoute filters (RequestHeaderModifier, ResponseHeaderModifier,
    RequestMirror, URLRewrite) are preserved on both the original rule and the newly injected
    header-match rule when header-based routing is active.
  # Uses 'default' namespace so the gateway (traefik-gateway) is accessible.
  namespace: default
  concurrent: false

  steps:
    - name: create-resources
      description: Create the HTTPRoute with 4 filters and the Rollout. Uses pause:{duration:30s} for auto-promotion.
      try:
        - apply:
            file: resources/httproute.yaml
        - apply:
            file: resources/rollout.yaml

    - name: assert-initial-state
      description: Plugin initializes the HTTPRoute with canary weight 0; the 4 original filters are present.
      try:
        - assert:
            timeout: 30s
            file: assertions/httproute-initial.yaml

    - name: wait-for-initial-healthy
      description: Wait for the initial rollout to reach Healthy before triggering a canary.
      try:
        - assert:
            timeout: 5m
            file: assertions/rollout-healthy.yaml

    - name: trigger-canary
      description: Update the rollout image to start a canary (setWeight:30 -> setHeaderRoute -> pause:30s).
      try:
        - patch:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                name: httproute-filters-rollout
                namespace: default
              spec:
                template:
                  spec:
                    containers:
                      - name: rollouts-demo
                        image: argoproj/rollouts-demo:green

    - name: assert-filters-preserved-in-header-route
      description: Both the original rule and the injected header-match rule must carry all 4 filters.
      try:
        - assert:
            timeout: 2m
            file: assertions/httproute-with-header-route.yaml

    - name: assert-rollout-healthy
      description: Wait for the canary to complete (30s pause auto-expires).
      try:
        - assert:
            timeout: 5m
            file: assertions/rollout-healthy.yaml

    - name: assert-cleanup
      description: Plugin removes the header-match rule; original rule still has its 4 filters with canary weight 0.
      try:
        - assert:
            timeout: 60s
            file: assertions/httproute-after-cleanup.yaml
