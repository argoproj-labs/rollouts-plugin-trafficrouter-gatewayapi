apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-filters
  namespace: default
spec:
  (length(rules)): 1
  rules:
    - (length(filters)): 4
      backendRefs:
        - name: single-httproute-filters-stable-service
        - name: single-httproute-filters-canary-service
          (weight): 0
