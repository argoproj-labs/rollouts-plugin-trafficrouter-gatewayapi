apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: httproute-filters-rollout
  namespace: default
spec:
  replicas: 2
  strategy:
    canary:
      canaryService: single-httproute-filters-canary-service
      stableService: single-httproute-filters-stable-service
      trafficRouting:
        managedRoutes:
          - name: filter-preservation-route
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoutes:
              - name: httproute-filters
                useHeaderRoutes: true
            namespace: default
      steps:
        - setWeight: 30
        - setHeaderRoute:
            name: filter-preservation-route
            match:
              - headerName: X-Filter-Test
                headerValue:
                  exact: preserve-filters
        - pause: {duration: 30s}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: single-httproute-filters
  template:
    metadata:
      labels:
        app: single-httproute-filters
    spec:
      containers:
        - name: rollouts-demo
          image: argoproj/rollouts-demo:red
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
