apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: grpcroute-hbw-rollout
  namespace: default
spec:
  replicas: 2
  strategy:
    canary:
      canaryService: grpcroute-header-before-weight-canary-service
      stableService: grpcroute-header-before-weight-stable-service
      trafficRouting:
        managedRoutes:
          - name: canary-route1
        plugins:
          argoproj-labs/gatewayAPI:
            grpcRoutes:
              - name: grpcroute-hbw
                useHeaderRoutes: true
            namespace: default
      steps:
        - setHeaderRoute:
            name: canary-route1
            match:
              - headerName: X-Canary
                headerValue:
                  exact: "true"
        - setWeight: 30
        - pause: {duration: 30s}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: grpcroute-header-before-weight
  template:
    metadata:
      labels:
        app: grpcroute-header-before-weight
    spec:
      containers:
        - name: rollouts-demo
          image: argoproj/rollouts-demo:red
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
