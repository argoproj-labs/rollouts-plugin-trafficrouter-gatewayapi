apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-two-headers
  namespace: default
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: default
  rules:
    - matches:
        - headers:
            - name: X-Security
              type: Exact
              value: secret123
      backendRefs:
        - name: httproute-two-headers-stable-service
          port: 80
        - name: httproute-two-headers-canary-service
          port: 80
