apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpcroute-header-advanced
  namespace: default
spec:
  (length(rules)): 3
  rules:
    - backendRefs:
        - name: advanced-header-based-grpcroute-stable-service
          (weight): 10
        - name: advanced-header-based-grpcroute-canary-service
          (weight): 90
    # Issue #158: Header-based routes should NOT have their weights updated
    # They should maintain a single canary backendRef (weight stays at 1, not updated to match setWeight)
    - name: canary-route1
      matches:
        - headers:
            - name: X-Test
              type: Exact
              value: test
      backendRefs:
        - name: advanced-header-based-grpcroute-canary-service
          (weight): 1
    - name: canary-route2
      matches:
        - headers:
            - name: X-Version
              type: Exact
              value: v2
      backendRefs:
        - name: advanced-header-based-grpcroute-canary-service
          (weight): 1
