apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpcroute-header-advanced
  namespace: default
spec:
  (length(rules)): 3
  rules:
    - backendRefs:
        - name: advanced-header-based-grpcroute-stable-service
          (weight): 40
        - name: advanced-header-based-grpcroute-canary-service
          (weight): 60
    - name: canary-route1
      matches:
        - headers:
            - name: X-Test
              type: Exact
              value: test
      backendRefs:
        - name: advanced-header-based-grpcroute-canary-service
    - name: canary-route2
      matches:
        - headers:
            - name: X-Version
              type: Exact
              value: v2
      backendRefs:
        - name: advanced-header-based-grpcroute-canary-service
