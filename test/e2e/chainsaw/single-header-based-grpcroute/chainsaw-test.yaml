apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: single-header-based-grpcroute
  labels:
    route-type: grpc
    test-scope: headers
spec:
  description: >
    Verifies header-based routing with a single GRPCRoute. The plugin must inject
    a header-match rule (X-Test: test) during a canary rollout and remove it once
    the rollout completes.
  # Uses 'default' namespace so the gateway (traefik-gateway) is accessible.
  namespace: default
  concurrent: false

  steps:
    - name: create-resources
      description: Create the GRPCRoute and Rollout. The rollout uses pause:{duration:30s} so it self-promotes.
      try:
        - apply:
            file: resources/services.yaml
        - apply:
            file: resources/grpcroute.yaml
        - apply:
            file: resources/rollout.yaml

    - name: assert-initial-state
      description: Plugin initializes the GRPCRoute with 1 rule and canary weight 0.
      try:
        - assert:
            timeout: 30s
            file: assertions/grpcroute-initial.yaml

    - name: wait-for-initial-healthy
      description: Wait for the initial rollout to reach Healthy before triggering a canary.
      try:
        - assert:
            timeout: 5m
            file: assertions/rollout-healthy.yaml

    - name: trigger-canary
      description: Update the rollout image to start a canary (setWeight:30 -> setHeaderRoute -> pause:30s).
      try:
        - patch:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                name: grpcroute-header-rollout
                namespace: default
              spec:
                template:
                  spec:
                    containers:
                      - name: rollouts-demo
                        image: argoproj/rollouts-demo:green

    - name: assert-header-routing-active
      description: Plugin must have added a header-match rule (X-Test:test) alongside the original weight-split rule.
      try:
        - assert:
            timeout: 2m
            file: assertions/grpcroute-with-header-route.yaml

    - name: assert-rollout-healthy
      description: Wait for the canary to complete (30s pause auto-expires).
      try:
        - assert:
            timeout: 5m
            file: assertions/rollout-healthy.yaml

    - name: assert-cleanup
      description: Plugin must remove the header-match rule and reset canary weight to 0 after rollout completes.
      try:
        - assert:
            timeout: 60s
            file: assertions/grpcroute-after-cleanup.yaml
