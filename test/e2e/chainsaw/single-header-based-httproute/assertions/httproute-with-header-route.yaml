apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-header
  namespace: default
spec:
  (length(rules)): 2
  rules:
    - backendRefs:
        - name: single-header-based-httproute-stable-service
          (weight): 70
        - name: single-header-based-httproute-canary-service
          (weight): 30
    - name: canary-route1
      matches:
        - headers:
            - name: X-Test
              type: Exact
              value: test
      backendRefs:
        - name: single-header-based-httproute-canary-service
