apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: httproute-header-rollout
  namespace: default
spec:
  replicas: 2
  strategy:
    canary:
      canaryService: single-header-based-httproute-canary-service
      stableService: single-header-based-httproute-stable-service
      trafficRouting:
        managedRoutes:
          - name: canary-route1
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoutes:
              - name: httproute-header
                useHeaderRoutes: true
            namespace: default
      steps:
        - setWeight: 30
        - setHeaderRoute:
            name: canary-route1
            match:
              - headerName: X-Test
                headerValue:
                  exact: test
        - pause: {duration: 30s}   # auto-promotes — no promote command needed in tests
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: single-header-based-httproute
  template:
    metadata:
      labels:
        app: single-header-based-httproute
    spec:
      containers:
        - name: rollouts-demo
          image: argoproj/rollouts-demo:red
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
