apiVersion: v1
kind: Service
metadata:
  name: single-header-based-httproute-stable-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: single-header-based-httproute
---
apiVersion: v1
kind: Service
metadata:
  name: single-header-based-httproute-canary-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: single-header-based-httproute
