apiVersion: v1
kind: Service
metadata:
  name: httproute-header-before-weight-stable-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: httproute-header-before-weight
---
apiVersion: v1
kind: Service
metadata:
  name: httproute-header-before-weight-canary-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: httproute-header-before-weight
