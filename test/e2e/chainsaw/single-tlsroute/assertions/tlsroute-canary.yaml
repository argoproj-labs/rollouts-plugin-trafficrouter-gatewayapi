apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: tlsroute-basic
  namespace: default
spec:
  (length(rules)): 1
  rules:
    - backendRefs:
        - name: single-tlsroute-stable-service
          (weight): 70
        - name: single-tlsroute-canary-service
          (weight): 30
