apiVersion: v1
kind: Service
metadata:
  name: single-tlsroute-stable-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: single-tlsroute
---
apiVersion: v1
kind: Service
metadata:
  name: single-tlsroute-canary-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: single-tlsroute
