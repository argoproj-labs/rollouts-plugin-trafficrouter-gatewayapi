apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-same-header-name
  namespace: default
spec:
  # Regression test for issue #215: both managed routes match the same header name
  # (user-group) with different values and must coexist as distinct rules.
  (length(rules)): 3
  rules:
    - backendRefs:
        - name: httproute-same-header-name-stable-service
          (weight): 70
        - name: httproute-same-header-name-canary-service
          (weight): 30
    - name: canary-route-1
      matches:
        - headers:
            - name: user-group
              type: Exact
              value: qa
      backendRefs:
        - name: httproute-same-header-name-canary-service
    - name: canary-route-2
      matches:
        - headers:
            - name: user-group
              type: Exact
              value: internal
      backendRefs:
        - name: httproute-same-header-name-canary-service
