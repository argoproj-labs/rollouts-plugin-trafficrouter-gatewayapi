apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpcroute-filters
  namespace: default
spec:
  (length(rules)): 2
  rules:
    - (length(filters)): 3
      backendRefs:
        - name: argo-rollouts-stable-service
          (weight): 70
        - name: argo-rollouts-canary-service
          (weight): 30
    - matches:
        - headers:
            - name: X-GRPC-Filter-Test
              type: Exact
              value: preserve-grpc-filters
      (length(filters)): 3
      backendRefs:
        - name: argo-rollouts-canary-service
          (weight): 30
