apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-header-advanced
  namespace: default
spec:
  (length(rules)): 3
  rules:
    - backendRefs:
        - name: argo-rollouts-stable-service
          (weight): 40
        - name: argo-rollouts-canary-service
          (weight): 60
    - name: canary-route1
      matches:
        - headers:
            - name: X-Test
              type: Exact
              value: test
      backendRefs:
        - name: argo-rollouts-canary-service
    - name: canary-route2
      matches:
        - headers:
            - name: X-Version
              type: Exact
              value: v2
      backendRefs:
        - name: argo-rollouts-canary-service
