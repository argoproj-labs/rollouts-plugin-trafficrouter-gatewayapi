apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-header-advanced
  namespace: default
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: default
  rules:
    - backendRefs:
        - name: advanced-header-based-httproute-stable-service
          port: 80
        - name: advanced-header-based-httproute-canary-service
          port: 80
