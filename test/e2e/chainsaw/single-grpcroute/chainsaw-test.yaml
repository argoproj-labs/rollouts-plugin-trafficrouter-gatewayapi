apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: single-grpcroute
  labels:
    route-type: grpc
spec:
  description: >
    Verifies basic weight-based canary traffic splitting with a single GRPCRoute.
    The plugin must set canary weight to 30 when a canary is active and reset it
    to 0 once the rollout completes.
  # Uses 'default' namespace so the gateway (traefik-gateway) is accessible.
  namespace: default
  concurrent: false

  steps:
    - name: create-resources
      description: Create the GRPCRoute and Rollout. The rollout uses pause:{duration:30s} so it self-promotes.
      try:
        - apply:
            file: resources/services.yaml
        - apply:
            file: resources/grpcroute.yaml
        - apply:
            file: resources/rollout.yaml

    - name: assert-initial-state
      description: Plugin initializes the GRPCRoute with canary weight 0.
      try:
        - assert:
            timeout: 30s
            file: assertions/grpcroute-initial.yaml

    - name: wait-for-initial-healthy
      description: Wait for the initial rollout to reach Healthy before triggering a canary.
      try:
        - assert:
            timeout: 5m
            file: assertions/rollout-healthy.yaml

    - name: trigger-canary
      description: Update the rollout image to start a canary (setWeight:30 -> pause:30s).
      try:
        - patch:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Rollout
              metadata:
                name: grpcroute-rollout
                namespace: default
              spec:
                template:
                  spec:
                    containers:
                      - name: rollouts-demo
                        image: argoproj/rollouts-demo:green

    - name: assert-canary-weight-active
      description: Plugin must have set canary weight to 30 and stable to 70.
      try:
        - assert:
            timeout: 2m
            file: assertions/grpcroute-canary.yaml

    - name: assert-rollout-healthy
      description: Wait for the canary to complete (30s pause auto-expires).
      try:
        - assert:
            timeout: 5m
            file: assertions/rollout-healthy.yaml

    - name: assert-cleanup
      description: Plugin must reset canary weight to 0 after rollout completes.
      try:
        - assert:
            timeout: 60s
            file: assertions/grpcroute-after-cleanup.yaml
