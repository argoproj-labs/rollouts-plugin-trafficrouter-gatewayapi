apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpcroute-basic
  namespace: default
spec:
  (length(rules)): 1
  rules:
    - backendRefs:
        - name: single-grpcroute-stable-service
          (weight): 70
        - name: single-grpcroute-canary-service
          (weight): 30
