apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-mirror
  namespace: default
spec:
  (length(rules)): 2
  rules:
    # Base rule: normal weight-split between stable and canary
    - backendRefs:
        - name: argo-rollouts-stable-service
          (weight): 70
        - name: argo-rollouts-canary-service
          (weight): 30
    # Mirror rule: appended by the plugin, carries the RequestMirror filter
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /
      (length(filters)): 1
      filters:
        - type: RequestMirror
          requestMirror:
            backendRef:
              name: argo-rollouts-canary-service
            percent: 100
      backendRefs:
        - name: argo-rollouts-stable-service
          (weight): 70
        - name: argo-rollouts-canary-service
          (weight): 30
