apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tcproute-rollout
  namespace: default
spec:
  replicas: 2
  strategy:
    canary:
      canaryService: single-tcproute-canary-service
      stableService: single-tcproute-stable-service
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            tcpRoute: tcproute-basic
            namespace: default
      steps:
        - setWeight: 30
        - pause: {duration: 30s}
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: single-tcproute
  template:
    metadata:
      labels:
        app: single-tcproute
    spec:
      containers:
        - name: rollouts-demo
          image: argoproj/rollouts-demo:red
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
