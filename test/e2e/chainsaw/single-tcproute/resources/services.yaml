apiVersion: v1
kind: Service
metadata:
  name: single-tcproute-stable-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: single-tcproute
---
apiVersion: v1
kind: Service
metadata:
  name: single-tcproute-canary-service
spec:
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: single-tcproute
