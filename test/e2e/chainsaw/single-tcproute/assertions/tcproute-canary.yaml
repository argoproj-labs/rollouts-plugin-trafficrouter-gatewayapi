apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: tcproute-basic
  namespace: default
spec:
  (length(rules)): 1
  rules:
    - backendRefs:
        - name: single-tcproute-stable-service
          (weight): 70
        - name: single-tcproute-canary-service
          (weight): 30
